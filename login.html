<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATRIA METRIC | Acesso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #0a0f1c; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
        .gradient-text {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full glass p-8 rounded-[2.5rem] shadow-2xl">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-emerald-500 rounded-2xl flex items-center justify-center text-white font-bold text-2xl mx-auto mb-4 shadow-lg shadow-emerald-500/20">AM</div>
            <h1 id="authTitle" class="text-3xl font-black text-white mb-2">Entrar na Atria</h1>
            <p id="authSubtitle" class="text-slate-400">Acesse sua auditoria de métricas</p>
        </div>

        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2 ml-1">E-mail</label>
                <input type="email" id="loginEmail" required class="w-full bg-slate-900 border border-slate-800 rounded-2xl px-5 py-4 text-white focus:border-emerald-500 outline-none transition" placeholder="seu@email.com">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2 ml-1">Senha</label>
                <input type="password" id="loginSenha" required class="w-full bg-slate-900 border border-slate-800 rounded-2xl px-5 py-4 text-white focus:border-emerald-500 outline-none transition" placeholder="••••••••">
            </div>
            <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-black py-4 rounded-2xl transition transform active:scale-95 shadow-xl shadow-emerald-500/20">
                Acessar Dashboard
            </button>
        </form>

        <form id="registerForm" class="space-y-4 hidden">
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2 ml-1">Nome Completo</label>
                <input type="text" id="regNome" required class="w-full bg-slate-900 border border-slate-800 rounded-2xl px-5 py-4 text-white focus:border-emerald-500 outline-none transition">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2 ml-1">E-mail Corporativo</label>
                <input type="email" id="regEmail" required class="w-full bg-slate-900 border border-slate-800 rounded-2xl px-5 py-4 text-white focus:border-emerald-500 outline-none transition">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2 ml-1">Senha</label>
                <input type="password" id="regSenha" required class="w-full bg-slate-900 border border-slate-800 rounded-2xl px-5 py-4 text-white focus:border-emerald-500 outline-none transition">
            </div>
            <button type="submit" class="w-full bg-white text-slate-900 font-black py-4 rounded-2xl transition transform active:scale-95 shadow-xl">
                Criar Minha Conta
            </button>
        </form>

        <div class="mt-8 text-center">
            <button id="toggleAuth" class="text-sm font-semibold text-slate-400 hover:text-emerald-400 transition">
                Não tem uma conta? <span class="text-white">Cadastre-se grátis</span>
            </button>
        </div>
    </div>

    <script>
        // URL DO SEU WORKER DE AUTH (Verifique se é esta mesma)
        const AUTH_API = "https://atria-auth-worker.jonhyelson.workers.dev";

        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const toggleBtn = document.getElementById('toggleAuth');
        const authTitle = document.getElementById('authTitle');

        // Alternar entre Login e Cadastro
        toggleBtn.addEventListener('click', () => {
            const isLogin = !loginForm.classList.contains('hidden');
            loginForm.classList.toggle('hidden');
            registerForm.classList.toggle('hidden');
            authTitle.innerText = isLogin ? "Criar Conta" : "Entrar na Atria";
            toggleBtn.innerHTML = isLogin ? 'Já tem conta? <span class="text-white">Fazer Login</span>' : 'Não tem uma conta? <span class="text-white">Cadastre-se grátis</span>';
        });

        // Lógica de Registro
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerText = "Criando...";
            btn.disabled = true;

            try {
                const res = await fetch(`${AUTH_API}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        nome: document.getElementById('regNome').value,
                        email: document.getElementById('regEmail').value,
                        senha: document.getElementById('regSenha').value
                    })
                });

                const data = await res.json();
                if (data.success) {
                    alert("Conta criada! Agora faça login.");
                    location.reload();
                } else {
                    alert(data.error || "Erro ao cadastrar.");
                }
            } catch (err) {
                alert("Erro na conexão com o servidor.");
            } finally {
                btn.innerText = "Criar Minha Conta";
                btn.disabled = false;
            }
        });

        // Lógica de Login
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerText = "Autenticando...";
            btn.disabled = true;

            try {
                const res = await fetch(`${AUTH_API}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('loginEmail').value,
                        senha: document.getElementById('loginSenha').value
                    })
                });

                const data = await res.json();
                if (data.success) {
                    // Salva os dados do usuário no LocalStorage para o Dashboard usar
                    localStorage.setItem('atria_user', JSON.stringify(data.user));
                    window.location.href = 'dashboard.html';
                } else {
                    alert(data.error || "E-mail ou senha incorretos.");
                }
            } catch (err) {
                alert("Erro na conexão com o servidor.");
            } finally {
                btn.innerText = "Acessar Dashboard";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
